name: mac_cleaner
description: "A new Flutter project for MacCleaner."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  
  # Routing
  go_router: ^14.0.0
  
  # UI / Window management
  window_manager: ^0.3.9
  macos_ui: ^2.0.0
  
  # Utilities
  path: ^1.9.0
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3
  intl: ^0.19.0
  
  # Visualization & Charts
  fl_chart: ^0.68.0
  
  # Animations
  lottie: ^3.1.0
  
  # File processing
  watcher: ^1.1.0
  crypto: ^3.0.3

dev_dependencies:
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.3

flutter:
  uses-material-design: true
